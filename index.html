<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ছোটদের ডিজিটাল লাইব্রেরি</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="library-container">
        <h1>🎒 আমার মজার লাইব্রেরি 📚</h1>
        
        <div class="accordion-item class-1">
            <button class="accordion-toggle class-btn">
                <span><i class="fa-solid fa-child-reaching class-icon"></i> ১ম শ্রেণী</span>
            </button>
            <div class="accordion-content subjects-container">
                
                <div class="accordion-item">
                    <button class="accordion-toggle subject-btn">
                        <span><i class="fa-solid fa-book-open subject-icon bangla"></i> আমার বাংলা বই</span>
                    </button>
                    <div class="accordion-content chapters-container">
                        <ul>
                            <li><a href="#"><i class="fa-solid fa-star chapter-icon"></i> অধ্যায় ১: পাঠ সূচনা</a></li>
                            <li><a href="#"><i class="fa-solid fa-star chapter-icon"></i> অধ্যায় ২: আমাদের দেশ</a></li>
                        </ul>
                    </div>
                </div>

                <div class="accordion-item">
                    <button class="accordion-toggle subject-btn">
                        <span><i class="fa-solid fa-language subject-icon english"></i> English for Today</span>
                    </button>
                    <div class="accordion-content chapters-container">
                        <ul>
                            <li><a href="#"><i class="fa-solid fa-star chapter-icon"></i> Unit 1: Greetings</a></li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>

        <div class="accordion-item class-2">
            <button class="accordion-toggle class-btn">
                <span><i class="fa-solid fa-user-graduate class-icon"></i> ২য় শ্রেণী</span>
            </button>
            <div class="accordion-content subjects-container">
                <div class="accordion-item">
                    <button class="accordion-toggle subject-btn">
                        <span><i class="fa-solid fa-calculator subject-icon math"></i> প্রাথমিক গণিত</span>
                    </button>
                    <div class="accordion-content chapters-container">
                        <ul>
                            <li><a href="#"><i class="fa-solid fa-star chapter-icon"></i> অধ্যায় ১: সংখ্যা গণনা</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        </div>

    <script src="script.js"></script>
</body>
</html>
