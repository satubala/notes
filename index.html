<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার মজার স্কুল লাইব্রেরি</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Hind+Siliguri:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bubble-bg">
        <div class="bubble">🎈</div>
        <div class="bubble">✨</div>
        <div class="bubble">🎨</div>
        <div class="bubble">🚀</div>
    </div>

    <div class="library-container">
        <h1 class="main-title">🚀 আমার মজার লাইব্রেরি 🎒</h1>
        
        <div class="accordion-item">
            <button class="accordion-toggle class-btn c1">
                <span class="btn-text"><i class="fa-solid fa-gamepad icon-pop"></i> ১ম শ্রেণী</span>
            </button>
            <div class="accordion-content subjects-container">
                
                <div class="accordion-item">
                    <button class="accordion-toggle subject-btn sub-bangla">
                        <span class="btn-text"><i class="fa-solid fa-paint-brush"></i> আমার বাংলা বই</span>
                    </button>
                    <div class="accordion-content chapters-container">
                        <ul class="chapter-list">
                            <li><a href="#"><span class="badge">১</span> অধ্যায় ১: পাঠ সূচনা 🌟</a></li>
                            <li><a href="#"><span class="badge">২</span> অধ্যায় ২: আমাদের দেশ 🇧🇩</a></li>
                        </ul>
                    </div>
                </div>

                <div class="accordion-item">
                    <button class="accordion-toggle subject-btn sub-english">
                        <span class="btn-text"><i class="fa-solid fa-rocket"></i> English for Today</span>
                    </button>
                    <div class="accordion-content chapters-container">
                        <ul class="chapter-list">
                            <li><a href="#"><span class="badge">A</span> Unit 1: Greetings 👋</a></li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>

        <div class="accordion-item">
            <button class="accordion-toggle class-btn c2">
                <span class="btn-text"><i class="fa-solid fa-ice-cream icon-pop"></i> ২য় শ্রেণী</span>
            </button>
            <div class="accordion-content subjects-container">
                <div class="accordion-item">
                    <button class="accordion-toggle subject-btn sub-math">
                        <span class="btn-text"><i class="fa-solid fa-calculator"></i> প্রাথমিক গণিত</span>
                    </button>
                    <div class="accordion-content chapters-container">
                        <ul class="chapter-list">
                            <li><a href="#"><span class="badge">➕</span> সংখ্যা গণনা 🔢</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
