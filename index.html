<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container { max-width: 600px; margin: 20px auto; font-family: 'Arial', sans-serif; }
        .lesson-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .audio-row { 
            display: flex; align-items: center; gap: 15px; padding: 12px;
            margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer;
            transition: all 0.2s;
        }
        .audio-row:hover { background-color: #f0f7ff; border-color: #007bff; }
        .play-icon { font-size: 20px; color: #007bff; }
        .stress { font-weight: bold; color: #d32f2f; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="lesson-card">
        <h2>Unit 1: At the Library</h2>
        <p>Click any sentence to hear me read it!</p>

        <!-- Example from Class 5 English_7.jpg -->
        <div class="audio-row" onclick="playSnippet('rina_intro')">
            <span class="play-icon">🔊</span>
            <span>Rina: Hello! My name is Rina. Are you new here?</span>
        </div>

        <!-- Example from Class 5 English_9.jpg (Syllable Focus) -->
        <div class="audio-row" onclick="playSnippet('en_joy')">
            <span class="play-icon">🎯</span>
            <span>Practice Syllable: en-<span class="stress">JOY</span></span>
        </div>
    </div>
</div>

<!-- Hidden audio element pointing to your Render server -->
<audio id="masterAudio" src="https://your-render-app.onrender.com/audio/unit1.mp3"></audio>

<script>
    const audio = document.getElementById('masterAudio');
    
    // Map of labels to [start_time, end_time] in seconds
    const timestamps = {
        'rina_intro': [5.2, 8.5],
        'en_joy': [12.0, 13.5]
    };

    function playSnippet(id) {
        const [start, end] = timestamps[id];
        audio.currentTime = start;
        audio.play();

        // Stop playing when the snippet ends
        const checkEnd = setInterval(() => {
            if (audio.currentTime >= end) {
                audio.pause();
                clearInterval(checkEnd);
            }
        }, 100);
    }
</script>

</body>
</html>
